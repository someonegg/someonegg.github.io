<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="stylesheet" href="/vendor/katex.min.css" />
  <link rel="stylesheet" href="/assets/site/shell.css" />
  <link rel="stylesheet" href="/assets/site/markdown.css" />
  <title>LLM Wiki 索引</title>
</head>
<body>
  <main class="wrap is-doc-viewer">
    <div id="topNav" class="top-nav"></div>

    <section class="layout">
      <aside id="sidebar" class="sidebar card"></aside>
      <article id="viewer" class="viewer card">
        <p class="hint">正在加载 Wiki 索引...</p>
      </article>
    </section>
  </main>
  <button id="backTopBtn" class="back-top" type="button" aria-label="回到顶部">回到顶部</button>

  <script src="/vendor/marked.min.js"></script>
  <script src="/vendor/katex.min.js"></script>
  <script src="/vendor/katex-auto-render.min.js"></script>
  <script src="/assets/site/nav.js"></script>
  <script src="/assets/site/doc-viewer.js"></script>
  <script>
    initTopNav({
      containerEl: document.getElementById("topNav"),
      current: "wiki",
    });

    initDocViewer({
      sidebarEl: document.getElementById("sidebar"),
      viewerEl: document.getElementById("viewer"),
      backTopBtnEl: document.getElementById("backTopBtn"),
      indexUrl: "./index.md",
      sidebarTitle: "Wiki 索引",
      hideViewerByDefault: false,
      showRawLinkOnLoadError: false,
      showRawLinkOnIndexError: false,
      enableHistorySync: true,
      enableInDocFileLink: true,
      convertWikiLinks: true,
      frontmatterMode: "card",
      frontmatterLinkRefs: true,
      titleCaseFallback: true,
      errorIncludeFile: true,
      indexLoadErrorText: "无法读取 index.md",
      emptyText: "未从 index.md 解析到任何条目。",
      initialFileFallback: "overview.md",
    });
  </script>
</body>
</html>
